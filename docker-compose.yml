services:
  postgres:
    image: postgres:15
    container_name: wallet_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: wallet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bank-service

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - bank-service

  wallet-api:
    build: .
    container_name: wallet_api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - bank-service

networks:
  bank-service:

volumes:
  postgres_data: